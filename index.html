<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JM Store - Qualidade e Preço Justo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><nav><h1>JM</h1><div id="user-area"><button onclick="abrirLogin()">Entrar</button></div><button id="btn-admin" onclick="location.href='admin.html'" style="display:none">Painel</button><div class="carrinho-icone" onclick="abrirCarrinho()">🛒 <span id="carrinho-count">0</span></div></nav></header>

<section class="banner"><div><h2>Bem-vindo à JM Store</h2><p>iPhone, Tênis e T-Shirts com entrega em Luanda</p></div></section>

<section id="produtos">
  <h2>Nossos Produtos</h2>
  <div class="filtros">
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('iphone')">iPhone</button>
    <button onclick="filtrar('tenis')">Tênis</button>
    <button onclick="filtrar('tshirt')">T-shirt</button>
  </div>
  <div class="produtos" id="lista-produtos"><p id="loading">Carregando...</p></div> 
</section>

<!-- MODAL LOGIN -->
<div id="modal-login" class="modal">
  <div class="modal-conteudo">
    <span class="fechar" onclick="fecharLogin()">&times;</span>
    <h2>Login JM</h2>
    <input id="email-login" placeholder="Email">
    <input id="senha-login" type="password" placeholder="Senha">
    <button class="btn" onclick="login()">Entrar</button>
    <p>Não tem conta? <a href="#" id="link-cadastro">Cadastre-se</a></p>
  </div>
</div>

<!-- MODAL CADASTRO NOVO -->
<div id="modal-cadastro" class="modal">
  <div class="modal-conteudo">
    <span class="fechar" onclick="fecharCadastro()">&times;</span>
    <h2>Cadastro JM</h2>
    <input id="email-cadastro" placeholder="Email">
    <input id="senha-cadastro" type="password" placeholder="Senha">
    <button class="btn" id="btn-cadastrar">Cadastrar</button>
  </div>
</div>

<!-- MODAL CARRINHO -->
<div id="modal-carrinho" class="modal">
  <div class="modal-conteudo">
    <span class="fechar" onclick="fecharCarrinho()">&times;</span>
    <h2>Seu Carrinho</h2>
    <div class="carrinho-itens" id="carrinhoItens"></div>
    <h3>Total: <span id="totalCarrinho">0</span> KZ</h3>
    <button class="btn btn-whatsapp" onclick="finalizar()">Finalizar no WhatsApp</button>
  </div>
</div>



<footer><h3>JM Store</h3><p>Luanda - Angola</p><p>© 2026 JM</p></footer>
<script src="script.js"></script>
</body>
</html>
